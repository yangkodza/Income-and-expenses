<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกรายรับ-รายจ่าย พร้อมระบบสำรองข้อมูล</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            margin-top: 0;
        }
        .summary-box {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .summary-item {
            text-align: center;
            flex: 1;
        }
        .summary-item span {
            display: block;
            font-size: 13px;
            color: #64748b;
            margin-bottom: 5px;
        }
        .summary-item strong {
            font-size: 18px;
        }
        .income { color: #10b981; }
        .expense { color: #ef4444; }
        .balance { color: #0f172a; }
        
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #334155;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #2563eb;
        }
        
        /* โซนปุ่ม Backup / Import */
        .backup-zone {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed #cbd5e1;
        }
        .btn-backup {
            flex: 1;
            background-color: #059669;
            font-size: 13px;
            padding: 8px;
        }
        .btn-backup:hover {
            background-color: #047857;
        }
        .btn-import {
            flex: 1;
            background-color: #475569;
            font-size: 13px;
            padding: 8px;
            position: relative;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-import:hover {
            background-color: #334155;
        }
        .btn-import input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .history {
            margin-top: 25px;
        }
        .history h3 {
            color: #1e293b;
            font-size: 16px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }
        .list-group {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 220px;
            overflow-y: auto;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 8px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }
        .list-item.inc { border-left: 4px solid #10b981; }
        .list-item.exp { border-left: 4px solid #ef4444; }
        .btn-delete {
            background: #fee2e2;
            color: #ef4444;
            border: none;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        .btn-delete:hover {
            background: #fca5a5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 บันทึกรายรับ-รายจ่าย</h2>
    
    <div class="summary-box">
        <div class="summary-item">
            <span>รายรับ</span>
            <strong class="income" id="total-income">0.00</strong>
        </div>
        <div class="summary-item">
            <span>รายจ่าย</span>
            <strong class="expense" id="total-expense">0.00</strong>
        </div>
        <div class="summary-item">
            <span>คงเหลือ</span>
            <strong class="balance" id="total-balance">0.00</strong>
        </div>
    </div>

    <form id="tracker-form">
        <div class="form-group">
            <label for="description">รายการ</label>
            <input type="text" id="description" placeholder="เช่น ค่าอาหาร, เงินเดือน" required>
        </div>
        <div class="form-group">
            <label for="amount">จำนวนเงิน (บาท)</label>
            <input type="number" id="amount" step="0.01" placeholder="0.00" required>
        </div>
        <div class="form-group">
            <label for="type">ประเภท</label>
            <select id="type">
                <option value="income">รายรับ (+)</option>
                <option value="expense">รายจ่าย (-)</option>
            </select>
        </div>
        <button type="submit">บันทึกรายการ</button>
    </form>

    <div class="history">
        <h3>ประวัติรายการ</h3>
        <ul id="transaction-list" class="list-group">
            </ul>
    </div>

    <div class="backup-zone">
        <button type="button" class="btn-backup" onclick="exportBackup()">📥 สำรองข้อมูล (Backup)</button>
        <div class="btn-import">
            📤 นำเข้าข้อมูล (Import)
            <input type="file" id="import-file" accept=".json" onchange="importBackup(event)">
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('tracker-form');
    const descriptionInput = document.getElementById('description');
    const amountInput = document.getElementById('amount');
    const typeInput = document.getElementById('type');
    const transactionList = document.getElementById('transaction-list');
    
    const totalIncomeText = document.getElementById('total-income');
    const totalExpenseText = document.getElementById('total-expense');
    const totalBalanceText = document.getElementById('total-balance');

    // ดึงข้อมูลจาก LocalStorage
    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

    // ฟังก์ชันอัปเดตหน้าจอ
    function updateUI() {
        transactionList.innerHTML = '';
        let income = 0;
        let expense = 0;

        if (transactions.length === 0) {
            transactionList.innerHTML = '<li style="text-align:center; color:#94a3b8; padding: 20px 0; font-size:13px;">ยังไม่มีข้อมูลบันทึกในเครื่องนี้</li>';
        }

        transactions.forEach((transaction, index) => {
            const item = document.createElement('li');
            const isIncome = transaction.type === 'income';
            
            if (isIncome) {
                income += transaction.amount;
            } else {
                expense += transaction.amount;
            }

            item.classList.add('list-item', isIncome ? 'inc' : 'exp');
            item.innerHTML = `
                <div>
                    <strong>${transaction.description}</strong> <br>
                    <small style="color:#94a3b8; font-size:11px;">${transaction.date}</small>
                </div>
                <div style="text-align: right;">
                    <span class="${isIncome ? 'income' : 'expense'}" style="font-weight:600; margin-right:8px;">
                        ${isIncome ? '+' : '-'}${transaction.amount.toLocaleString('th-TH', {minimumFractionDigits: 2, maximumFractionDigits: 2})} บ.
                    </span>
                    <button class="btn-delete" onclick="deleteTransaction(${index})">ลบ</button>
                </div>
            `;
            transactionList.appendChild(item);
        });

        const balance = income - expense;
        totalIncomeText.innerText = income.toLocaleString('th-TH', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        totalExpenseText.innerText = expense.toLocaleString('th-TH', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        totalBalanceText.innerText = balance.toLocaleString('th-TH', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        
        totalBalanceText.style.color = balance >= 0 ? '#0f172a' : '#ef4444';
    }

    function updateLocalStorage() {
        localStorage.setItem('transactions', JSON.stringify(transactions));
    }

    // ฟังก์ชันเพิ่มรายการใหม่
    form.addEventListener('submit', function(e) {
        e.preventDefault();

        const now = new Date();
        const dateString = now.toLocaleDateString('th-TH') + ' ' + now.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});

        const transaction = {
            description: descriptionInput.value,
            amount: parseFloat(amountInput.value),
            type: typeInput.value,
            date: dateString
        };

        transactions.push(transaction);
        updateLocalStorage();
        updateUI();

        descriptionInput.value = '';
        amountInput.value = '';
    });

    // ฟังก์ชันลบรายการ
    function deleteTransaction(index) {
        if(confirm('คุณต้องการลบรายการนี้ใช่หรือไม่?')) {
            transactions.splice(index, 1);
            updateLocalStorage();
            updateUI();
        }
    }

    // ==========================================
    // ฟังก์ชันเพิ่มเติม: Backup & Import ข้อมูล
    // ==========================================

    // 1. ฟังก์ชันส่งออกไฟล์ Backup (.json)
    function exportBackup() {
        if (transactions.length === 0) {
            alert('ไม่มีข้อมูลให้สำรองในขณะนี้');
            return;
        }

        // แปลงข้อมูลเป็นข้อความ JSON
        const dataStr = JSON.stringify(transactions, null, 2);
        const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
        
        // ตั้งชื่อไฟล์ตามวันที่ปัจจุบัน เช่น backup_wallet_14_6_2026.json
        const today = new Date();
        const exportFileDefaultName = `backup_wallet_${today.getDate()}_${today.getMonth()+1}_${today.getFullYear()}.json`;
        
        // สร้างปุ่มลิงก์จำลองเพื่อดาวน์โหลดไฟล์
        const linkElement = document.createElement('a');
        linkElement.setAttribute('href', dataUri);
        linkElement.setAttribute('download', exportFileDefaultName);
        linkElement.click();
    }

    // 2. ฟังก์ชันนำเข้าไฟล์ Backup (.json)
    function importBackup(event) {
        const fileElement = event.target;
        const file = fileElement.files[0];
        
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                
                // ตรวจสอบความถูกต้องของโครงสร้างไฟล์เบื้องต้น
                if (Array.isArray(importedData)) {
                    if (confirm('การนำเข้าข้อมูลจะเขียนทับข้อมูลเดิมที่มีอยู่ในเครื่องนี้ คุณต้องการดำเนินการต่อใช่หรือไม่?')) {
                        transactions = importedData;
                        updateLocalStorage();
                        updateUI();
                        alert('นำเข้าข้อมูลสำเร็จแล้ว!');
                    }
                } else {
                    alert('ไฟล์ไม่ถูกต้อง โครงสร้างข้อมูลรายรับรายจ่ายผิดพลาด');
                }
            } catch (err) {
                alert('เกิดข้อผิดพลาดในการอ่านไฟล์ กรุณาใช้ไฟล์ .json ที่ดาวน์โหลดมาจากระบบนี้เท่านั้น');
            }
            // รีเซ็ตค่าอินพุตเพื่อให้กดเลือกไฟล์เดิมซ้ำได้ถ้าต้องการ
            fileElement.value = '';
        };
        
        reader.readAsText(file);
    }

    // รันครั้งแรกเมื่อเปิดหน้าเว็บ
    updateUI();
</script>

</body>
</html>
